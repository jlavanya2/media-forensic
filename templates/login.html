<!DOCTYPE html>
<html>
<head>
<title>Digital Media Forensics - Login</title>

<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">

<style>
body {
    margin:0;
    height:100vh;
    display:flex;
    justify-content:center;
    align-items:center;
    background: radial-gradient(circle at top,#1b2735 0%,#090a0f 100%);
    overflow:hidden;
    color:white;
    font-family:'Segoe UI',sans-serif;
}

.login-box {
    background: rgba(255,255,255,0.05);
    padding:40px;
    border-radius:20px;
    width:350px;
    box-shadow:0 0 25px rgba(0,255,200,0.3);
    text-align:center;
    backdrop-filter: blur(10px);
}

h3 {
    margin-bottom:30px;
    color:#00ffcc;
}

.form-control {
    background:#111827;
    border:none;
    color:white;
}

.form-control:focus {
    background:#1f2937;
    color:white;
    box-shadow:none;
    border:1px solid #00ffcc;
}

.btn-login {
    background:#00ffcc;
    border:none;
    color:black;
    font-weight:bold;
}

.btn-login:hover {
    background:#00ddb0;
}

.star {
    position:fixed;
    width:2px;
    height:2px;
    background:white;
    opacity:0.8;
    animation: twinkle 2s infinite alternate;
}

@keyframes twinkle {
    from { opacity:0.2; }
    to { opacity:1; }
}

.crewmate {
    position:fixed;
    bottom:30px;
    right:30px;
    width:80px;
    animation: float 4s ease-in-out infinite;
}

@keyframes float {
    0% { transform:translateY(0px); }
    50% { transform:translateY(-15px); }
    100% { transform:translateY(0px); }
}
</style>

</head>
<body>

<div class="login-box">
    <h3>🚀 Forensic Command Login</h3>

    <form method="POST">
        <input type="text" name="username" class="form-control mb-3" placeholder="Username" required>
        <input type="password" name="password" class="form-control mb-3" placeholder="Password" required>
        <button class="btn btn-login w-100">Access System</button>
    </form>

    <p class="mt-3 text-muted" style="font-size:12px;">
        Default: admin / admin123
    </p>
</div>

<!-- Floating Crewmate -->
<img src="https://i.imgur.com/8Km9tLL.png" class="crewmate">

<script>
for(let i=0;i<60;i++){
let star=document.createElement("div");
star.className="star";
star.style.top=Math.random()*100+"vh";
star.style.left=Math.random()*100+"vw";
document.body.appendChild(star);
}
</script>

</body>
</html>
