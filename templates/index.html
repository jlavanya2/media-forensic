<!DOCTYPE html>
<html>
<head>
<title>Digital Media Forensics Command</title>

<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
<script src="https://cdn.jsdelivr.net/npm/chart.js"></script>

<style>
body {
    margin:0;
    background: radial-gradient(circle at top,#1b2735 0%,#090a0f 100%);
    color:white;
    font-family:'Segoe UI',sans-serif;
    overflow-x:hidden;
}

h2 { text-align:center; margin:20px; color:#00ffcc; }

.nav-tabs .nav-link { color:#94a3b8; }
.nav-tabs .nav-link.active {
    background:#111827;
    color:#00ffcc;
    border-color:#334155;
}

.grid {
    display:grid;
    grid-template-columns: repeat(auto-fit,minmax(350px,1fr));
    gap:20px;
}

.panel {
    background: rgba(255,255,255,0.05);
    padding:20px;
    border-radius:15px;
    box-shadow:0 0 15px rgba(0,255,150,0.2);
    transition:0.3s;
}

.panel:hover { transform:translateY(-5px); }

.risk-card {
    background: rgba(255,0,0,0.15);
    padding:10px;
    border-left:4px solid #ff4d4d;
    margin-bottom:10px;
    border-radius:8px;
}

.badge-low { background:#22c55e; }
.badge-medium { background:#f59e0b; }
.badge-high { background:#ef4444; }

#dropZone {
    border:2px dashed #00ffcc;
    padding:30px;
    text-align:center;
    border-radius:15px;
    cursor:pointer;
}

.star {
    position:fixed;
    width:2px;
    height:2px;
    background:white;
    opacity:0.8;
    animation: twinkle 2s infinite alternate;
}

@keyframes twinkle {
    from { opacity:0.2; }
    to { opacity:1; }
}

.crewmate {
    position:fixed;
    bottom:30px;
    right:30px;
    width:80px;
    animation: float 4s ease-in-out infinite;
}

@keyframes float {
    0% { transform:translateY(0px); }
    50% { transform:translateY(-15px); }
    100% { transform:translateY(0px); }
}

/* SCAN OVERLAY */
#scanOverlay {
    position:fixed;
    top:0;
    left:0;
    width:100%;
    height:100%;
    background:rgba(0,0,0,0.85);
    display:none;
    justify-content:center;
    align-items:center;
    z-index:9999;
}

.scan-box {
    width:320px;
    height:220px;
    border:2px solid #00ffcc;
    position:relative;
    overflow:hidden;
    border-radius:10px;
    text-align:center;
    padding-top:90px;
}

.scanner-line {
    position:absolute;
    top:0;
    left:0;
    width:100%;
    height:4px;
    background:#00ffcc;
    animation: scan 2s linear infinite;
}

@keyframes scan {
    0% { top:0; }
    100% { top:100%; }
}
</style>
</head>

<body>

<div id="scanOverlay"></div>

<h2>🚀 Digital Media Forensics Command</h2>

<ul class="nav nav-tabs container">
<li class="nav-item"><a class="nav-link active" data-bs-toggle="tab" href="#analysis">Analysis</a></li>
<li class="nav-item"><a class="nav-link" data-bs-toggle="tab" href="#hash">Hash Compare</a></li>
<li class="nav-item"><a class="nav-link" data-bs-toggle="tab" href="#history">Case History</a></li>
<li class="nav-item"><a class="nav-link" data-bs-toggle="tab" href="#audit">Audit Log</a></li>
<li class="nav-item ms-auto"><a class="nav-link text-danger" href="/logout">Logout</a></li>
</ul>

<div class="tab-content container mt-4">

<!-- ANALYSIS TAB -->
<div id="analysis" class="tab-pane fade show active">

<div id="dropZone" class="panel">
Drag & Drop File Here or Click to Upload
<input type="file" id="mediaFile" hidden>
<p id="fileNameDisplay" style="margin-top:10px;color:#00ffcc;"></p>
</div>

<button onclick="analyzeMedia()" class="btn btn-success w-100 mt-3">
Initiate Forensic Scan
</button>

<div id="analysisResults" style="display:none;" class="mt-4">

<div class="grid">

<div class="panel">
<h5>Forensic Summary</h5>
<p id="summaryBox"></p>
<span id="tamperBadge" class="badge"></span>
</div>

<div class="panel">
<h5>Authenticity</h5>
<h3><span id="authPercent">0</span>%</h3>
<canvas id="authChart"></canvas>
</div>

<div class="panel">
<h5>Risk Breakdown</h5>
<canvas id="breakdownChart"></canvas>
</div>

<div class="panel">
<h5>Watermark Detection</h5>
<p id="watermarkResult"></p>
</div>

<div class="panel">
<h5>Image Preview</h5>
<div style="position:relative;">
<img id="preview" style="max-width:100%;border-radius:10px;">
<div id="highlightBox" style="position:absolute;border:3px solid red;display:none;"></div>
</div>
</div>

<div class="panel">
<h5>Detailed Risk Intelligence</h5>
<div id="reasonList"></div>
</div>

</div>

<button onclick="downloadReport()" class="btn btn-warning w-100 mt-4">
Download Case Report (PDF)
</button>

</div>
</div>

<!-- HASH TAB -->
<div id="hash" class="tab-pane fade">
<div class="panel">
<input type="file" id="file1" class="form-control mb-2">
<input type="file" id="file2" class="form-control mb-2">
<button onclick="compareHashes()" class="btn btn-warning w-100">Compare SHA-256</button>
<p id="hashResult" class="mt-3"></p>
</div>
</div>

<!-- HISTORY TAB -->
<div id="history" class="tab-pane fade">
<button onclick="loadCases()" class="btn btn-info w-100 mb-3">Load Case History</button>
<button onclick="exportCSV()" class="btn btn-secondary w-100 mb-3">Export CSV</button>
<div class="panel">
<table class="table table-dark">
<thead>
<tr><th>Case</th><th>File</th><th>Auth</th><th>Tamper</th><th>Date</th></tr>
</thead>
<tbody id="caseTable"></tbody>
</table>
</div>
</div>

<!-- AUDIT TAB -->
<div id="audit" class="tab-pane fade">
<div class="panel">
<ul id="auditList"></ul>
</div>
</div>

</div>

<img src="https://i.imgur.com/8Km9tLL.png" class="crewmate">

<script>

let currentCaseId=null;
let authChartInstance=null;
let breakdownChartInstance=null;

/* Drag Drop */
const dropZone=document.getElementById("dropZone");
dropZone.onclick=()=>document.getElementById("mediaFile").click();

dropZone.ondragover=e=>{
    e.preventDefault();
    dropZone.style.background="rgba(0,255,200,0.1)";
};
dropZone.ondragleave=e=>{
    dropZone.style.background="";
};
dropZone.ondrop=e=>{
    e.preventDefault();
    document.getElementById("mediaFile").files=e.dataTransfer.files;
    dropZone.style.background="";
    if(e.dataTransfer.files.length){
        document.getElementById("fileNameDisplay").innerText=
        "Selected File: "+e.dataTransfer.files[0].name;
    }
};

document.getElementById("mediaFile").addEventListener("change",function(){
    if(this.files.length){
        document.getElementById("fileNameDisplay").innerText=
        "Selected File: "+this.files[0].name;
    }
});

/* ANALYSIS */
async function analyzeMedia(){

    const fileInput=document.getElementById("mediaFile");
    if(!fileInput.files.length){ alert("Select file"); return; }

    document.getElementById("scanOverlay").style.display="flex";
    document.getElementById("scanOverlay").innerHTML=`
    <div class="scan-box">
        <div class="scanner-line"></div>
        <p>Scanning Media Integrity...</p>
    </div>`;

    const formData=new FormData();
    formData.append("media",fileInput.files[0]);

    document.getElementById("preview").src=
    URL.createObjectURL(fileInput.files[0]);

    const response=await fetch("/analyze",{method:"POST",body:formData});
    const data=await response.json();

    document.getElementById("scanOverlay").style.display="none";

    if(data.error){ alert(data.error); return; }

    currentCaseId=data.case_id;
    document.getElementById("analysisResults").style.display="block";

    document.getElementById("authPercent").innerText=data.authenticity;

    document.getElementById("summaryBox").innerText=
        "Resolution: "+data.forensic_data.width+"x"+data.forensic_data.height+
        " | Edge Density: "+data.forensic_data.edge_density+
        " | Entropy: "+data.forensic_data.entropy+
        " | Metadata Present: "+data.metadata_present;

    let badge=document.getElementById("tamperBadge");
    badge.innerText="Tamper Probability: "+data.tamper_level;
    badge.className="badge "+
        (data.tamper_level==="LOW"?"badge-low":
        data.tamper_level==="MEDIUM"?"badge-medium":"badge-high");

    document.getElementById("watermarkResult").innerText=
        data.watermark.watermark_detected
        ? "Watermark Detected"
        : "No Watermark Found";

    updateCharts(data);

    /* -------- DETAILED RISK INTELLIGENCE -------- */
    document.getElementById("reasonList").innerHTML =
        data.breakdown.map(item => `
            <div class="risk-card">
                <h6>${item.title}</h6>
                <p><b>Impact Score:</b> ${item.impact_score}%</p>
                <p><b>Analysis:</b> ${item.analysis}</p>
                <p><b>Risk Reason:</b> ${item.risk_reason}</p>
            </div>
        `).join("");

}

/* Charts */
function updateCharts(data){

    if(authChartInstance)authChartInstance.destroy();
    if(breakdownChartInstance)breakdownChartInstance.destroy();

    authChartInstance=new Chart(document.getElementById("authChart"),{
        type:"doughnut",
        data:{
            labels:["Authentic","Risk"],
            datasets:[{
                data:[data.authenticity,data.risk],
                backgroundColor:["#00ff88","#ff4d4d"]
            }]
        }
    });

    breakdownChartInstance=new Chart(document.getElementById("breakdownChart"),{
        type:"bar",
        data:{
            labels:data.breakdown.map(item=>item.title),
            datasets:[{
                label:"Impact %",
                data:data.breakdown.map(item=>item.impact_score),
                backgroundColor:"#00ffcc"
            }]
        },
        options:{scales:{y:{beginAtZero:true,max:100}}}
    });
}

/* PDF */
function downloadReport(){
    if(currentCaseId){
        window.open("/download/"+currentCaseId);
    }
}

/* Case History */
async function loadCases(){
    const res=await fetch("/cases");
    const data=await res.json();
    document.getElementById("caseTable").innerHTML=
        data.map(c=>`
        <tr>
            <td>${c.case_id}</td>
            <td>${c.filename}</td>
            <td>${c.authenticity}%</td>
            <td>${c.tamper_level}</td>
            <td>${c.timestamp}</td>
        </tr>`).join("");
}

function exportCSV(){
    window.open("/export_csv");
}

/* Audit */
async function loadAuditLogs(){
    const res=await fetch("/audit_logs");
    if(res.ok){
        const data=await res.json();
        document.getElementById("auditList").innerHTML=
            data.map(l=>`<li>${l.timestamp} - ${l.action}</li>`).join("");
    }
}
setInterval(loadAuditLogs,5000);
async function compareHashes(){

const f1=document.getElementById("file1").files[0];
const f2=document.getElementById("file2").files[0];

if(!f1||!f2){alert("Select 2 files");return;}

const formData=new FormData();
formData.append("file1",f1);
formData.append("file2",f2);

const res=await fetch("/compare",{method:"POST",body:formData});
const data=await res.json();

if(data.error){ alert(data.error); return; }

document.getElementById("hashResult").innerHTML=
`
<b>Media Type:</b> ${data.type}<br>
<b>Hash Match:</b> ${data.hash_match}<br>
<b>Similarity:</b> ${data.similarity}%<br>
<b>Relationship:</b> ${data.relationship}
`;
}
/* Stars */
for(let i=0;i<60;i++){
    let star=document.createElement("div");
    star.className="star";
    star.style.top=Math.random()*100+"vh";
    star.style.left=Math.random()*100+"vw";
    document.body.appendChild(star);
}

</script>
<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>

</body>
</html>
